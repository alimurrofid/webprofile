name: 🚀 Deploy React Webprofile to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS (Secure)
        env:
          USER: ${{ secrets.SERVER_USER }}
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT || '22' }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        run: |
          set -e
          echo "🚀 Starting secure deployment..."

          ssh -p $PORT -o StrictHostKeyChecking=accept-new $USER@$HOST "
            set -e
            echo '🔒 Deployment started on remote server.'

            # Load NVM (silent)
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\" >/dev/null 2>&1 || true
            nvm use 22 >/dev/null 2>&1 || true

            # Verify Node & NPM
            if command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1; then
              echo '✅ Node & NPM detected.'
            else
              echo '❌ Node/NPM not found — aborting.'
              exit 1
            fi

            # Navigate & sync repo
            cd $PROJECT_PATH
            git fetch origin main --quiet
            git reset --hard origin/main --quiet

            # Install & build
            echo '📦 Installing dependencies...'
            npm ci --no-audit --no-fund >/dev/null 2>&1

            echo '🏗️ Building project...'
            npm run build >/dev/null 2>&1

            # Restart Nginx
            echo '♻️ Restarting web service...'
            sudo systemctl restart nginx || echo '⚠️ Restart failed (manual check needed).'

            echo '✅ Deployment finished successfully at' \$(date)
          "

      - name: Confirm deployment
        if: success()
        run: echo "✅ Deployment complete. Build and service restarted successfully."
